<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Career Workspace</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      line-height: 1.45;
      height: 100vh;
      overflow: hidden;
    }
    .workspace {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      height: 100vh;
    }
    #tree-panel,
    #center-panel,
    #right-panel {
      overflow-y: auto;
      padding: 1rem;
      border-right: 1px solid #888;
    }
    #right-panel { border-right: none; border-left: 1px solid #888; }
    #center-panel { background: rgba(128, 128, 128, 0.06); }
    .panel-header h1,
    .panel-header h2 {
      font-size: 1rem;
      margin: 0 0 0.75rem;
    }
    .search input {
      width: 100%;
      font-family: inherit;
      padding: 0.35rem 0.5rem;
      margin-bottom: 0.5rem;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .tree { list-style: none; padding: 0; margin: 0.75rem 0 0; }
    .tree ul { list-style: none; padding-left: 1rem; margin: 0.25rem 0; }
    .tree summary { cursor: pointer; }
    .experience-row { display: flex; align-items: flex-start; gap: 0.5rem; }
    .experience-row details { flex: 1; min-width: 0; }
    .experience-row > button { flex-shrink: 0; margin-top: 0; font-size: 0.85rem; }
    .error { color: #c00; font-size: 0.9rem; }
    .flash {
      background: rgba(0, 128, 0, 0.12);
      border: 1px solid rgba(0, 128, 0, 0.35);
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }
    .muted { color: #777; font-style: italic; font-size: 0.9rem; }
    .empty-state { margin-top: 2rem; text-align: center; color: #666; }
    .empty-state h2 { font-size: 1.1rem; margin: 0 0 0.5rem; }
    form label { display: block; margin-top: 0.5rem; font-size: 0.85rem; }
    form textarea {
      width: 100%;
      font-family: inherit;
      padding: 0.35rem;
      margin-top: 0.15rem;
      min-height: 10rem;
    }
    button {
      margin-top: 0.5rem;
      font-family: inherit;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
    }
    button:disabled,
    textarea:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>
  {% if request.query_params.get("flash") %}
  <div class="flash" style="margin: 0; border-radius: 0; border-left: none; border-right: none; border-top: none;">{{ request.query_params.get("flash") }}</div>
  {% endif %}
  <div class="workspace">
    <aside id="tree-panel">{% include "partials/tree.html" %}</aside>
    <main id="center-panel">{% include "partials/center_placeholder.html" %}</main>
    <aside id="right-panel">{% include "partials/right_notes.html" %}</aside>
  </div>
</body>
</html>
